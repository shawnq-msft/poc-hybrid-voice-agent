syntax = "proto3";

package voice_agent.azure_embedded.v1;

service AzureEmbeddedSpeech {
  rpc Recognize(stream AsrRequest) returns (stream AsrEvent);
  rpc Synthesize(TtsRequest) returns (TtsResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  repeated ModelStatus asr_models = 2;
  repeated ModelStatus tts_models = 3;
}

message ModelStatus {
  string id = 1;
  string locale = 2;
  string path = 3;
  bool loaded = 4;
  string detail = 5;
}

message AsrRequest {
  oneof payload {
    AsrConfig config = 1;
    bytes pcm16 = 2;
    bool end = 3;
  }
}

message AsrConfig {
  string model = 1;
  string locale = 2;
  int32 sample_rate_hz = 3;
  int32 channels = 4;
  int32 bits_per_sample = 5;
}

message AsrEvent {
  string type = 1;
  string model = 2;
  string locale = 3;
  string text = 4;
  int64 bytes = 5;
  int64 elapsed_ms = 6;
  string detail = 7;
}

message TtsRequest {
  string voice = 1;
  string locale = 2;
  string text = 3;
  int32 sample_rate_hz = 4;
}

message TtsResponse {
  string voice = 1;
  string locale = 2;
  string media_type = 3;
  bytes audio = 4;
  int64 elapsed_ms = 5;
}
