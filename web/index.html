<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hybrid Voice Agent</title>
    <link rel="stylesheet" href="/assets/styles.css?v=2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Voice session controls">
        <div>
          <p class="eyebrow">Local-first voice agent</p>
          <h1>Hybrid Voice Agent</h1>
        </div>
        <div class="status-row">
          <span id="connectionStatus" class="status-pill">Idle</span>
          <span id="providerStatus" class="status-pill muted">Loading providers</span>
        </div>
        <div class="button-row">
          <button id="loadModelsButton" type="button">Load Models</button>
          <button id="connectButton" type="button" disabled>Start</button>
          <button id="backendCheckButton" type="button">Backend Check</button>
          <button id="muteButton" type="button" disabled>Mute</button>
          <button id="disconnectButton" type="button" disabled>Stop</button>
        </div>
        <div class="module-strip" aria-label="Speech pipeline modules">
          <section class="module-card" aria-label="Microphone module">
            <div class="module-heading"><span>MIC</span><strong id="micStatus">Idle</strong></div>
            <label>Input/API<select id="micSelector"><option>Browser getUserMedia</option></select></label>
            <div class="volume-meter" aria-hidden="true"><span id="volumeFill"></span></div>
            <div class="module-metric"><span id="volumeValue">0%</span><small>volume</small></div>
          </section>
          <section class="module-card" aria-label="VAD module">
            <div class="module-heading"><span>VAD</span><strong id="vadStatus">Idle</strong></div>
            <label>Model/API<select id="vadSelector"><option value="silero:300">Silero VAD · 300 ms</option><option value="silero:500" selected>Silero VAD · 500 ms</option><option value="silero:800">Silero VAD · 800 ms</option></select></label>
            <dl class="latency-list">
              <div><dt>End</dt><dd id="vadTurn">-</dd></div>
              <div><dt>AVG</dt><dd id="vadAvg">-</dd></div>
              <div><dt>P90</dt><dd id="vadP90">-</dd></div>
            </dl>
          </section>
          <section class="module-card" aria-label="ASR module">
            <div class="module-heading"><span>ASR</span><strong id="asrStatus">Idle</strong></div>
            <label>Model/API<select id="asrSelector"><option value="azure-embedded:en-GB" selected>Azure Embedded ASR en-GB 35M</option><option value="azure-embedded:zh-CN">Azure Embedded ASR zh-CN 35M</option><option value="foundry-local:nemotron-3.5-asr-streaming-0.6b:auto">Foundry Nemotron ASR multilingual 0.6B</option><option value="foundry-local:nemotron-speech-streaming-en-0.6b:en">Foundry Nemotron Speech English 0.6B</option><option disabled>faster-whisper tiny CPU fallback</option><option disabled>whisper.cpp</option><option disabled>Vosk</option></select></label>
            <dl class="latency-list">
              <div><dt id="asrMetricLabel">Final</dt><dd id="asrTurn">-</dd></div>
              <div><dt>AVG</dt><dd id="asrAvg">-</dd></div>
              <div><dt>P90</dt><dd id="asrP90">-</dd></div>
            </dl>
          </section>
          <section class="module-card" aria-label="LLM module">
            <div class="module-heading"><span>LLM</span><strong id="llmStatus">Idle</strong></div>
            <label>Model/API<select id="llmSelector"><option>Foundry qwen2.5 0.5B</option><option disabled>Foundry Local model</option><option disabled>Cloud fallback</option></select></label>
            <dl class="latency-list">
              <div><dt>TTFT</dt><dd id="llmTurn">-</dd></div>
              <div><dt>AVG</dt><dd id="llmAvg">-</dd></div>
              <div><dt>P90</dt><dd id="llmP90">-</dd></div>
            </dl>
          </section>
          <section class="module-card" aria-label="TTS module">
            <div class="module-heading"><span>TTS</span><strong id="ttsStatus">Idle</strong></div>
            <label>Model/API<select id="ttsSelector"><option value="azure-embedded">Azure Embedded Xiaoxiao HD</option><option value="edge-tts">Edge Xiaoxiao Neural</option><option value="windows-sapi">Windows SAPI</option><option value="browser-speech" disabled>Browser speechSynthesis</option><option value="azure-speech" disabled>Azure Speech</option></select></label>
            <dl class="latency-list">
              <div><dt>TTFB</dt><dd id="ttsTurn">-</dd></div>
              <div><dt>AVG</dt><dd id="ttsAvg">-</dd></div>
              <div><dt>P90</dt><dd id="ttsP90">-</dd></div>
            </dl>
          </section>
        </div>
        <section class="voice-latency" aria-label="Voice to voice total latency">
          <strong>Voice2Voice</strong>
          <span>Turn <b id="v2vTurn">-</b></span>
          <span>AVG <b id="v2vAvg">-</b></span>
          <span>P90 <b id="v2vP90">-</b></span>
        </section>
        <audio id="remoteAudio" autoplay playsinline></audio>
      </section>

      <section class="transcript-grid" aria-label="Conversation transcript">
        <article>
          <h2>You</h2>
          <div id="userTranscript" class="transcript-box">Waiting for speech...</div>
        </article>
        <article>
          <h2>Assistant</h2>
          <div id="assistantTranscript" class="transcript-box">No response yet.</div>
        </article>
      </section>

      <section class="event-log" aria-label="Session events">
        <h2>Events</h2>
        <ol id="eventLog"></ol>
      </section>
    </main>
    <script src="/assets/app.js?v=33" type="module"></script>
  </body>
</html>
